<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeSwap · Perfil</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Geist', sans-serif; background: #f0f4fa; color: #0f172a; min-height: 100vh; }
  .header { background: #0f1f6e; padding: 15px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 30px; height: 30px; background: #1a3bcc; border-radius: 7px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.15); }
  .logo-name { font-size: 16px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
  .logo-name span { color: #7eb3ff; }
  .timestamp { font-size: 10px; font-family: 'Geist Mono', monospace; color: rgba(255,255,255,0.35); letter-spacing: 0.3px; }
  .hero { background: linear-gradient(160deg, #0f1f6e 0%, #1a3bcc 100%); padding: 22px 24px 28px; position: relative; overflow: hidden; }
  .hero::after { content: ''; position: absolute; right: -30px; top: -30px; width: 160px; height: 160px; border-radius: 50%; background: rgba(255,255,255,0.04); }
  .profile-hero { display: flex; align-items: center; gap: 14px; position: relative; z-index: 1; }
  .avatar { width: 50px; height: 50px; border-radius: 50%; background: rgba(126,179,255,0.2); border: 1.5px solid rgba(126,179,255,0.35); display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 600; color: #7eb3ff; font-family: 'Geist Mono', monospace; flex-shrink: 0; }
  .profile-name { font-size: 20px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
  .profile-dni { font-size: 11px; font-family: 'Geist Mono', monospace; color: rgba(255,255,255,0.45); margin-top: 3px; letter-spacing: 0.5px; }
  .main { max-width: 480px; margin: 0 auto; padding: 22px 20px 60px; }
  .alert-banner { background: #fffbeb; border: 1px solid #fcd34d; border-left: 3px solid #f59e0b; border-radius: 10px; padding: 11px 14px; margin-bottom: 18px; display: flex; align-items: flex-start; gap: 10px; }
  .alert-banner svg { width: 14px; height: 14px; color: #d97706; flex-shrink: 0; margin-top: 2px; }
  .alert-banner p { font-size: 12px; color: #92400e; line-height: 1.5; }
  .section-card { background: #fff; border: 1px solid #dde4f0; border-radius: 16px; padding: 18px 22px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(15,31,110,0.05); }
  .section-title { font-size: 10px; font-family: 'Geist Mono', monospace; letter-spacing: 1.8px; color: #1a3bcc; text-transform: uppercase; font-weight: 500; margin-bottom: 13px; display: flex; align-items: center; gap: 7px; }
  .section-title svg { width: 12px; height: 12px; opacity: 0.7; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: #eaf0fb; }
  .data-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
  .data-row:last-child { border-bottom: none; padding-bottom: 0; }
  .data-label { font-size: 12px; color: #94a3b8; display: flex; align-items: center; gap: 6px; }
  .data-label svg { width: 12px; height: 12px; }
  .data-value { font-size: 13px; color: #0f172a; font-weight: 500; text-align: right; }
  .data-value.mono { font-family: 'Geist Mono', monospace; font-size: 12px; letter-spacing: 0.8px; color: #1a3bcc; }
  .patente-badge { display: inline-block; font-family: 'Geist Mono', monospace; font-size: 18px; font-weight: 500; color: #0f1f6e; background: #eef3ff; border: 1px solid #c0cffa; border-radius: 8px; padding: 7px 18px; letter-spacing: 4px; margin-bottom: 14px; }
  .coverage-pill { display: inline-flex; align-items: center; gap: 5px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 20px; padding: 3px 10px; font-size: 11px; color: #15803d; font-weight: 500; }
  .coverage-pill::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
  .btn-call { background: #eef3ff; color: #1a3bcc; border: 1px solid #c0cffa; border-radius: 10px; padding: 12px; font-size: 13px; font-family: 'Geist', sans-serif; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; text-decoration: none; transition: background 0.15s; }
  .btn-call:hover { background: #dde8ff; }
  .btn-call svg { width: 14px; height: 14px; }
  .btn-whatsapp { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; border-radius: 10px; padding: 12px; font-size: 13px; font-family: 'Geist', sans-serif; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; text-decoration: none; transition: background 0.15s; }
  .btn-whatsapp:hover { background: #dcfce7; }
  .footer-note { text-align: center; font-size: 10px; color: #c8d3e6; margin-top: 24px; font-family: 'Geist Mono', monospace; letter-spacing: 0.5px; }

  /* LOADING & ERROR */
  .loading-state { text-align: center; padding: 60px 20px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #dde4f0; border-top-color: #1a3bcc; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state p { font-size: 14px; color: #64748b; }
  .error-state { text-align: center; padding: 60px 20px; }
  .error-state h2 { font-size: 18px; font-weight: 600; color: #0f172a; margin-bottom: 8px; }
  .error-state p { font-size: 13px; color: #64748b; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <path d="M14 14h2v2h-2zM16 16h2v2h-2zM14 18h2v2h-2zM18 14h2v2h-2zM18 18h2v2h-2z"/>
      </svg>
    </div>
    <span class="logo-name">Safe<span>Swap</span></span>
  </div>
  <span class="timestamp" id="timestamp"></span>
</div>

<div id="app">
  <div class="main">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Cargando datos...</p>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ykykikgwgqcwvvsttdty.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlreWtpa2d3Z3Fjd3Z2c3R0ZHR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTY0NDEsImV4cCI6MjA5NTYzMjQ0MX0.1cJE8cj_KZBhmyn-4dOs54KR5I5x0gI5elHRZfIJMEA';

function ahora() {
  const now = new Date();
  return `Escaneado hoy · ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} hs`;
}

function iniciales(nombre, apellido) {
  return (nombre?.[0] || '') + (apellido?.[0] || '');
}

function renderPerfil(d) {
  document.getElementById('timestamp').textContent = ahora();
  document.getElementById('app').innerHTML = `
    <div class="hero">
      <div class="profile-hero">
        <div class="avatar">${iniciales(d.nombre, d.apellido).toUpperCase()}</div>
        <div>
          <div class="profile-name">${d.nombre} ${d.apellido}</div>
          <div class="profile-dni">DNI · ${d.dni}</div>
        </div>
      </div>
    </div>
    <div class="main">
      <div class="alert-banner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <p>Datos compartidos en contexto de siniestro vial. Usá esta información de forma responsable.</p>
      </div>

      <div class="section-card">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.56 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          Contacto
        </div>
        <div class="data-row">
          <span class="data-label">Teléfono</span>
          <span class="data-value mono">${d.telefono}</span>
        </div>
        <div class="data-row">
          <span class="data-label">Email</span>
          <span class="data-value" style="font-size:12px;">${d.email}</span>
        </div>
        <div class="contact-grid">
          <a href="tel:${d.telefono}" class="btn-call">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.56 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            Llamar
          </a>
          <a href="https://wa.me/${d.telefono.replace(/\D/g,'')}" target="_blank" class="btn-whatsapp">
            <svg viewBox="0 0 24 24" fill="currentColor" style="width:14px;height:14px"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            WhatsApp
          </a>
        </div>
      </div>

      <div class="section-card">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v4h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
          Vehículo
        </div>
        <div class="patente-badge">${d.patente.toUpperCase()}</div>
        <div class="data-row"><span class="data-label">Marca y modelo</span><span class="data-value">${d.marca} ${d.modelo} ${d.anio}</span></div>
        <div class="data-row"><span class="data-label">Color</span><span class="data-value">${d.color}</span></div>
      </div>

      <div class="section-card">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Seguro
        </div>
        <div class="data-row"><span class="data-label">Compañía</span><span class="data-value">${d.aseguradora}</span></div>
        <div class="data-row"><span class="data-label">Póliza</span><span class="data-value mono">${d.poliza}</span></div>
        <div class="data-row"><span class="data-label">Vencimiento</span><span class="data-value mono">${d.vencimiento}</span></div>
        <div class="data-row"><span class="data-label">Cobertura</span><span class="data-value"><span class="coverage-pill">${d.cobertura}</span></span></div>
        <div class="data-row"><span class="data-label">Tel. del seguro</span><span class="data-value mono">${d.telefono_seguro}</span></div>
      </div>

      <p class="footer-note">safeswap.com.ar · datos verificados al momento del registro</p>
    </div>
  `;
}

function renderError() {
  document.getElementById('app').innerHTML = `
    <div class="main">
      <div class="error-state">
        <h2>Perfil no encontrado</h2>
        <p>El código QR que escaneaste no corresponde a ningún perfil registrado.</p>
      </div>
    </div>
  `;
}

async function cargarPerfil() {
  const params = new URLSearchParams(window.location.search);
  const codigo = params.get('id');
  if (!codigo) { renderError(); return; }

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?codigo=eq.${codigo}&select=*`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    if (!data || data.length === 0) { renderError(); return; }
    renderPerfil(data[0]);
  } catch(e) {
    renderError();
  }
}

cargarPerfil();
</script>
</body>
</html>
